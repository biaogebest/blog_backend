spring.application.name=Blog
spring.datasource.url=jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=000000pP
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 默认每页数量
spring.data.web.pageable.default-page-size=10
# 最大每页数量
spring.data.web.pageable.max-page-size=50
# 是否从1开始分页（false表示从0开始）
spring.data.web.pageable.one-indexed-parameters=false

# 根日志级别
logging.level.root=INFO
# 项目包的日志级别
logging.level.jorthan.blog=DEBUG
# Hibernate SQL日志
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# 日志输出格式
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n